      <path d="M-58 22 C -20 6, 26 6, 60 -16" />
      <path d="M-30 56 C -16 22, -8 -16, 6 -60" />
      <path d="M22 58 C 18 24, 30 -8, 50 -36" />
      <circle r="20" fill="none" stroke="#fff" stroke-width="3" />
    </g>
  </g>

  <!-- Texto LEBRIJA -->
  <text x="120" y="232" text-anchor="middle"
        font-family="Oswald, Arial Narrow, sans-serif" font-weight="700"
        font-size="40" letter-spacing="2" fill="#111">LEBRIJA</text>

  <!-- Flores rojas con tallos verdes -->
  <g transform="translate(120,270)">
    <path d="M-2 8 C -18 0, -30 -18, -40 -30" fill="none" stroke="#3FA34D" stroke-width="4" stroke-linecap="round"/>
