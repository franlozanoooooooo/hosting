    <path d="M-1 10 L 1 -2" fill="none" stroke="#3FA34D" stroke-width="4" stroke-linecap="round"/>
    <g fill="#E1261C">
      <path d="M-40 -34 l5 -11 5 11 11 1 -8 8 3 11 -11 -6 -11 6 3 -11 -8 -8z"/>
      <path d="M40 -34 l5 -11 5 11 11 1 -8 8 3 11 -11 -6 -11 6 3 -11 -8 -8z"/>
    </g>
    <circle cx="-35" cy="-30" r="2.4" fill="#fff"/>
    <circle cx="45" cy="-30" r="2.4" fill="#fff"/>
