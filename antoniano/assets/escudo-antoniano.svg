<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" role="img" aria-label="Escudo del Club Atlético Antoniano de Lebrija">
  <title>Club Atlético Antoniano · Lebrija</title>

  <!-- Marco angular rojo (homenaje a la F del escudo original) -->
  <g fill="none" stroke="#E1261C" stroke-width="7" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M48 28 H196 V70 H150" />
    <path d="M70 50 H176" />
    <path d="M48 28 V250 L96 290" />
    <path d="M70 70 V210" />
  </g>

  <!-- Balón granate con costuras blancas -->
  <g transform="translate(140,120)">
    <circle r="62" fill="#6E1423" stroke="#fff" stroke-width="2.5" />
    <g fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round">
