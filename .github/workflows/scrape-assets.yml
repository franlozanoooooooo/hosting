name: Scrape brand assets
on:
  push:
    branches: ["claude/gracious-ritchie-4jmy59"]
    paths: [".github/workflows/scrape-assets.yml"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download pages
        run: |
          set -x
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          mkdir -p scrape/pages scrape/assets
          fetch() {
            curl -sL --max-time 40 -A "$UA" "$1" -o "$2" && echo "OK $1 ($(wc -c < "$2") bytes)" || echo "FAIL $1"
          }
          fetch "https://gruaslozano.netlify.app/" scrape/pages/redesign.html
          for p in "" gruas plataformas-elevadoras ingenieria sectores historia contacto servicios formacion calidad noticias camiones-grua-autocargantes camiones-grua plataformas-elevadoras/plataformas-articuladas plataformas-elevadoras/plataformas-de-tijera plataformas-elevadoras/plataformas-especiales plataformas-elevadoras/plataformas-telescopicas; do
            n=$(echo "$p" | tr '/' '_'); [ -z "$n" ] && n=home
            fetch "https://gruaslozano.com/$p/" "scrape/pages/orig_$n.html"
          done
          ls -la scrape/pages
      - name: Extract and download assets
        run: |
          set -x
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          RX='https?://[^"'"'"' )>\\]+[.](png|jpe?g|webp|svg|gif|ico|css|woff2?)'
          grep -hoE "$RX" scrape/pages/*.html | sort -u > scrape/asset-urls.txt || true
          # rutas relativas del rediseno netlify
          grep -hoE '(src|href)="[^"]+[.](png|jpe?g|webp|svg|gif|css|woff2?)"' scrape/pages/redesign.html | sed -E 's/^(src|href)="//; s/"$//' | grep -v '^http' | sed 's|^/||; s|^|https://gruaslozano.netlify.app/|' >> scrape/asset-urls.txt || true
          sort -u scrape/asset-urls.txt -o scrape/asset-urls.txt
          cat scrape/asset-urls.txt
          dl() {
            f="scrape/assets/$(echo "$1" | sed 's|https\?://||; s|[/?&=%]|_|g' | cut -c1-130)"
            curl -sL --max-time 40 -A "$UA" "$1" -o "$f" || true
          }
          i=0
          while read -r u; do
            i=$((i+1)); [ "$i" -gt 400 ] && break
            dl "$u"
          done < scrape/asset-urls.txt
          # segunda pasada: imagenes referenciadas dentro de los CSS descargados
          grep -hoE "$RX" scrape/assets/*.css 2>/dev/null | sort -u > scrape/css-urls.txt || true
          i=0
          while read -r u; do
            i=$((i+1)); [ "$i" -gt 40 ] && break
            dl "$u"
          done < scrape/css-urls.txt
          # limpiar vacios y paginas de error
          find scrape/assets -type f -size -200c -delete || true
          ls -la scrape/assets
          du -sh scrape
      - name: Commit results
        run: |
          git config user.name "asset-scraper"
          git config user.email "actions@users.noreply.github.com"
          git add -A scrape
          git commit -m "Add scraped brand assets from gruaslozano.com and previous redesign" || echo "nothing to commit"
          git push || {
            echo "PUSH FAILED — dumping key assets to log"
            for f in scrape/assets/*logo* scrape/pages/redesign.html; do
              [ -f "$f" ] && { echo "=== BASE64 $f ==="; base64 -w0 "$f" | head -c 2000000; echo; }
            done
          }
