name: Publish site to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build site directory
        run: |
          mkdir -p /tmp/_site
          rsync -a --exclude='.git' --exclude='.github' ./ /tmp/_site/
          touch /tmp/_site/.nojekyll
      - name: Push to gh-pages branch
        run: |
          cd /tmp/_site
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Publish site"
          git push -qf "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
