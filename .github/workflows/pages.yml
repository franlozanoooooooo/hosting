name: Deploy site to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build site directory
        run: |
          mkdir -p /tmp/_site
          rsync -a --exclude='.git' --exclude='.github' ./ /tmp/_site/
          touch /tmp/_site/.nojekyll
      - name: Push to gh-pages branch
        run: |
          cd /tmp/_site
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Publish site"
          git push -qf "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
      - name: Set Pages source to gh-pages (legacy mode)
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}' \
          && echo "Pages source updated" || {
            echo "PUT failed, trying POST (create)"
            curl -sf -X POST \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/pages" \
              -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}'
          }
