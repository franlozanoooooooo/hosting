name: Check public URLs
on:
  push:
    branches: ["claude/gracious-ritchie-4jmy59"]
    paths: [".github/workflows/check-urls.yml"]
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Curl candidates
        run: |
          for u in \
            "https://rawcdn.githack.com/franlozanoooooooo/hosting/9439de69bbfba1842634ccd1f375e3472ab03032/gruaslozano/index.html" \
            "https://rawcdn.githack.com/franlozanoooooooo/hosting/9439de69bbfba1842634ccd1f375e3472ab03032/gruaslozano/assets/hero.jpg" \
            "https://raw.githack.com/franlozanoooooooo/hosting/main/gruaslozano/index.html" \
            "https://franlozanoooooooo.github.io/hosting/gruaslozano/" ; do
            code=$(curl -s -o /tmp/body -w "%{http_code}" -L --max-time 25 "$u" || echo "ERR")
            size=$(wc -c < /tmp/body)
            echo "RESULT :: $code :: $size bytes :: $u"
          done
