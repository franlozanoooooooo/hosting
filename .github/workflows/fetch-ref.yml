name: Fetch reference site
on:
  push:
    branches: ["claude/gracious-ritchie-4jmy59"]
    paths: [".github/workflows/fetch-ref.yml"]
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download reference
        run: |
          mkdir -p refsite
          curl -sL --max-time 40 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/124.0" \
            "https://club-atletico-antoniano.netlify.app/" -o refsite/antoniano.html
          wc -c refsite/antoniano.html
      - name: Commit
        run: |
          git config user.name "ref-fetcher"
          git config user.email "actions@users.noreply.github.com"
          git add refsite && git commit -m "Add reference site snapshot" && git push
