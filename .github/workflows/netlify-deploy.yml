name: Deploy proposal to Netlify
on:
  workflow_dispatch:
    inputs:
      proxy_path:
        description: "Netlify MCP signed proxy URL (short-lived)"
        required: true
        type: string
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Deploy gruaslozano folder to Netlify
        working-directory: gruaslozano
        env:
          PROXY_PATH: ${{ inputs.proxy_path }}
        run: |
          npx -y @netlify/mcp@latest --site-id 32d6f046-7f9d-4380-9bb1-22bae9cb0279 --proxy-path "$PROXY_PATH"
